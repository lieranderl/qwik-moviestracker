version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Brussels"
    open-pull-requests-limit: 5
    groups:
      qwik:
        patterns:
          - "@builder.io/qwik*"
          - "qwik-*"
      styling:
        patterns:
          - "@tailwindcss/*"
          - "tailwindcss*"
          - "daisyui"
      test-and-build-tooling:
        dependency-type: "development"
        patterns:
          - "@biomejs/*"
          - "@playwright/*"
          - "@types/*"
          - "typescript"
          - "vite"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "Europe/Brussels"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "Europe/Brussels"
    commit-message:
      prefix: "docker"
