name: Quality and security

on:
  workflow_call:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify app
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      AUTH_SECRET: ci-build-auth-secret
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run build.types

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Production build
        run: bun run build

      - name: Dependency audit
        run: bun audit --audit-level=high

  e2e:
    name: Browser smoke tests
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AUTH_SECRET: ci-build-auth-secret
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: bun run test:e2e:smoke

  secrets:
    name: Secret scan
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan committed history for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container:
    name: Container build and scan
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      AUTH_SECRET: ci-runtime-auth-secret
      AUTH_URL: http://127.0.0.1:3000
      SMOKE_SKIP_AUTH_CTA: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production container
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: moviestracker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify runtime image
        run: |
          test "$(docker image inspect moviestracker:ci --format '{{.Config.User}}')" = "65532:65532"
          docker run --detach --rm --name moviestracker-ci --publish 127.0.0.1:3000:3000 --env AUTH_SECRET --env AUTH_URL moviestracker:ci
          trap 'docker stop moviestracker-ci >/dev/null 2>&1 || true' EXIT
          ./scripts/smoke-deployment.sh http://127.0.0.1:3000

      - name: Scan production container
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: moviestracker:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
